{{- if .Values.ollama.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Release.Name }}-ollama-data
  labels:
    {{- include "ai101.labels" . | nindent 4 }}
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: {{ .Values.ollama.storage.size }}
  {{- if .Values.ollama.storage.storageClassName }}
  storageClassName: {{ .Values.ollama.storage.storageClassName }}
  {{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-ollama
  labels:
    {{- include "ai101.labels" . | nindent 4 }}
    app.kubernetes.io/component: ollama
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: ollama
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: ollama
    spec:
      containers:
        - name: ollama
          image: {{ include "ai101.image" (dict "root" . "name" .Values.ollama.image) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: OLLAMA_KEEP_ALIVE
              value: {{ .Values.ollama.keepAlive | quote }}
            - name: OLLAMA_MODEL
              value: {{ .Values.ollama.model | quote }}
          ports:
            - name: http
              containerPort: 11434
          volumeMounts:
            - name: ollama-data
              mountPath: /root/.ollama
          readinessProbe:
            exec:
              command: ["ollama", "list"]
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            exec:
              command: ["ollama", "list"]
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            {{- toYaml .Values.ollama.resources | nindent 12 }}
      volumes:
        - name: ollama-data
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-ollama-data
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-ollama
  labels:
    {{- include "ai101.labels" . | nindent 4 }}
    app.kubernetes.io/component: ollama
spec:
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: ollama
  ports:
    - name: http
      port: 11434
      targetPort: http
{{- end }}
